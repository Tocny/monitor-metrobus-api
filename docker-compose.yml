services:
  # En dev esto es necesario, define parámetros para desarrollo local.
  api:
    build: .
    container_name: monitor-metrobus-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Monta el codigo para desarrollo con auto-reload.
      - ./app:/code/app
      - ./scripts:/code/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    container_name: monitor-metrobus-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Expuesto al host para poder inspeccionar la BD con un manejador
      - "5432:5432"
    volumes:
      - metrobus_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  metrobus_db_data:
